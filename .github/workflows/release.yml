name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (on release)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup Node.js (on release)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies (on release)
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build (on release)
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Tag release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Released version ${{ steps.release.outputs.tag_name }}"
